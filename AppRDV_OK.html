      <button class="LB BR" id="b_br">
        <div style="width:34px;height:34px;border-radius:50%;background:rgba(0,212,170,0.15);color:#00d4aa;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">BR</div>
        <div style="text-align:left"><div style="color:#00d4aa">Bresler</div><div style="font-size:11px;color:#8888a0;font-weight:400">Mes rendez-vous</div></div>
      </button>
      <button class="LB LE" id="b_le">
        <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,107,138,0.15);color:#ff6b8a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">LE</div>
        <div style="text-align:left"><div style="color:#ff6b8a">Lefebvre</div><div style="font-size:11px;color:#8888a0;font-weight:400">Mes rendez-vous</div></div>
      </button>
    </div>
  </div>
</div>
<div id="APP">
  <div class="TB">
    <div class="TL">Prospect<span style="color:#00d4aa">B</span><span style="color:#ff6b8a">L</span></div>
    <div class="SD"></div><span style="font-size:10px;color:#8888a0">Temps reel</span>
    <div style="flex:1"></div>
    <div class="UP" id="UP"></div>
    <button class="BEX" id="BEXP" style="display:none">Export</button>
    <button class="BLO" id="BLOG">Deconnexion</button>
  </div>
  <div class="SR" id="SR"></div>
  <div id="SV" style="display:none;flex:1;overflow:hidden">
    <div class="CT">
      <div class="LP">
        <div class="TO">
          <input class="SE" id="SRH" placeholder="Rechercher...">
          <div class="FC" id="FC"></div>
        </div>
        <div class="RC" id="RCT"></div>
        <div class="LS3" id="CL"></div>
      </div>
      <div class="DP">
        <div class="ES" id="EMS"><div style="font-size:36px;opacity:0.3">&#x1F464;</div><div>Selectionnez un contact</div></div>
        <div class="DS" id="DC" style="display:none"></div>
      </div>
    </div>
  </div>
  <div id="CV" style="display:none;flex:1;overflow-y:auto"><div class="CV2" id="CVL"></div></div>
</div>
<div class="TST" id="TST"></div>
<script>
var CO = JSON.parse(document.getElementById('CODATA').textContent);
var CM = {};
CO.forEach(function(c){ CM[c.id] = c; });
var RTDB = 'https://propsect-40795-default-rtdb.europe-west1.firebasedatabase.app';
var ldb = {}, user = null, filt = 'all', cid = null, scom = null, pollTimer = null;
var SL = {sgn:'Signe',rcl:'Rappel',nrp:'NRP',npe:'Pas interesse'};

function dbGet(cb){
  fetch(RTDB+'/rdvs.json').then(function(r){return r.json();}).then(function(d){ldb=d||{};if(cb)cb();}).catch(function(){if(cb)cb();});
}
function dbSet(id,val,cb){
  fetch(RTDB+'/rdvs/'+id+'.json',{method:val?'PUT':'DELETE',body:val?JSON.stringify(val):null,headers:{'Content-Type':'application/json'}})
    .then(function(){dbGet(function(){rStats();rList();if(user==='bresler'||user==='lefebvre')rCom();if(cid!==null)selC(cid);if(cb)cb();});})
    .catch(function(){toast('Erreur','ER');});
}
function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(function(){dbGet(function(){rStats();rList();if(user==='bresler'||user==='lefebvre')rCom();});},5000);}

var FILTERS=[{f:'all',l:'Tous'},{f:'pending',l:'Sans RDV'},{f:'rdv',l:'RDV'},{f:'sgn',l:'Signe'},{f:'rcl',l:'Rappel'},{f:'nrp',l:'NRP'},{f:'npe',l:'Pas int.'}];
var fc=document.getElementById('FC');
FILTERS.forEach(function(fi,i){
  var btn=document.createElement('button');btn.className='CH'+(i===0?' AC':'');btn.textContent=fi.l;
  btn.addEventListener('click',function(){filt=fi.f;document.querySelectorAll('.CH').forEach(function(b){b.classList.remove('AC');});btn.classList.add('AC');rList();});
  fc.appendChild(btn);
});
document.getElementById('SRH').addEventListener('input',rList);
document.getElementById('b_std').addEventListener('click',function(){login('standardiste');});
document.getElementById('b_br').addEventListener('click',function(){login('bresler');});
document.getElementById('b_le').addEventListener('click',function(){login('lefebvre');});
document.getElementById('BLOG').addEventListener('click',function(){user=null;cid=null;if(pollTimer)clearInterval(pollTimer);document.getElementById('LS').style.display='flex';document.getElementById('APP').style.display='none';});
document.getElementById('BEXP').addEventListener('click',doExport);

function login(role){
  user=role;
  document.getElementById('LS').style.display='none';
  var a=document.getElementById('APP');a.style.display='flex';a.style.flexDirection='column';
  var p=document.getElementById('UP');p.className='UP '+(role==='standardiste'?'ST':role==='bresler'?'BR':'LE');
  p.textContent=role==='standardiste'?'Standardiste':role==='bresler'?'Bresler':'Lefebvre';
  dbGet(function(){
    if(role==='standardiste'){document.getElementById('SV').style.display='flex';document.getElementById('SV').style.flexDirection='row';document.getElementById('CV').style.display='none';document.getElementById('BEXP').style.display='block';rList();}
    else{document.getElementById('SV').style.display='none';document.getElementById('CV').style.display='block';rCom();}
    rStats();startPoll();
  });
}

function rStats(){
  var all=Object.values(ldb),rdvs=all.filter(function(d){return d&&d.rdv;});
  var b=rdvs.filter(function(d){return d.rdv.c==='bresler';}).length;
  var l=rdvs.filter(function(d){return d.rdv.c==='lefebvre';}).length;
  var sg=all.filter(function(d){return d&&d.s==='sgn';}).length;
  var rc=all.filter(function(d){return d&&d.s==='rcl';}).length;
  var nr=all.filter(function(d){return d&&d.s==='nrp';}).length;
  var np=all.filter(function(d){return d&&d.s==='npe';}).length;
  var h='';
  if(user==='standardiste'){
    h+='<div class="SC"><div class="SN">'+CO.length.toLocaleString()+'</div><div class="SL2">Contacts</div></div>';
    h+='<div class="SC"><div class="SN" style="color:#00d4aa">'+b+'</div><div class="SL2">Bresler</div></div>';
    h+='<div class="SC"><div class="SN" style="color:#ff6b8a">'+l+'</div><div class="SL2">Lefebvre</div></div>';
  }else if(user){var my=rdvs.filter(function(d){return d.rdv.c===user;}).length;h+='<div class="SC"><div class="SN" style="color:'+(user==='bresler'?'#00d4aa':'#ff6b8a')+'">'+my+'</div><div class="SL2">Mes RDV</div></div>';}
  h+='<div class="SC"><div class="SN" style="color:#22c55e">'+sg+'</div><div class="SL2">Signes</div></div>';
  h+='<div class="SC"><div class="SN" style="color:#f59e0b">'+rc+'</div><div class="SL2">Rappels</div></div>';
  h+='<div class="SC"><div class="SN" style="color:#8b5cf6">'+nr+'</div><div class="SL2">NRP</div></div>';
  h+='<div class="SC"><div class="SN" style="color:#ef4444">'+np+'</div><div class="SL2">Pas int.</div></div>';
  document.getElementById('SR').innerHTML=h;
}

function getList(){
  var q=(document.getElementById('SRH').value||'').toLowerCase().trim();
  return CO.filter(function(c){
    var e=ldb[c.id]||{};
    if(filt==='pending'&&(e.rdv||e.s))return false;
    if(filt==='rdv'&&!e.rdv)return false;
    if(['sgn','rcl','nrp','npe'].indexOf(filt)>=0&&e.s!==filt)return false;
    if(q){var h=(c.nom+' '+c.prenom+' '+c.tel1+' '+c.ville+' '+c.cp).toLowerCase();return h.indexOf(q)>=0;}
    return true;
  });
}

var BARCLS={sgn:'SGN',rcl:'RCL',nrp:'NRP',npe:'NPE'};
var PCOL={sgn:'#22c55e',rcl:'#f59e0b',nrp:'#8b5cf6',npe:'#ef4444'};
var PBG={sgn:'rgba(34,197,94,0.12)',rcl:'rgba(245,158,11,0.12)',nrp:'rgba(139,92,246,0.12)',npe:'rgba(239,68,68,0.12)'};

function rList(){
  var el=document.getElementById('CL');if(!el)return;
  var fl=getList();
  var rc=document.getElementById('RCT');if(rc)rc.textContent=fl.length.toLocaleString()+' contacts';
  var frag=document.createDocumentFragment();
  fl.slice(0,400).forEach(function(c){
    var e=ldb[c.id]||{};
    var div=document.createElement('div');
    var cls='CR';if(c.id===cid)cls+=' SEL';
    if(e.s&&BARCLS[e.s])cls+=' '+BARCLS[e.s];else if(e.rdv)cls+=' '+(e.rdv.c==='bresler'?'RBR':'RLE');
    div.className=cls;div.dataset.id=c.id;
    var init=((c.nom||'')[0]||'')+((c.prenom||'')[0]||'');
    var badge='';
    if(e.s&&PCOL[e.s])badge='<span class="PI" style="background:'+PBG[e.s]+';color:'+PCOL[e.s]+'">'+SL[e.s]+'</span>';
    else if(e.rdv){var bc=e.rdv.c==='bresler'?'#00d4aa':'#ff6b8a';badge='<span class="PI" style="background:rgba(0,0,0,0.3);color:'+bc+'">'+e.rdv.c+' '+e.rdv.d+'</span>';}
    var sub=[c.tel1,c.ville].filter(Boolean).join(' - ');
    div.innerHTML='<div class="IND"></div><div class="ASM">'+init.toUpperCase()+'</div><div class="RI"><div class="RN">'+c.nom+' '+c.prenom+'</div><div class="RS2">'+(sub||'Pas de tel')+'</div></div><div>'+badge+'</div>';
    div.addEventListener('click',function(){selC(parseInt(div.dataset.id));});
    frag.appendChild(div);
  });
  el.innerHTML='';el.appendChild(frag);
}

function selC(id){
  cid=id;scom=null;var c=CM[id];if(!c)return;var e=ldb[id]||{};
  document.getElementById('EMS').style.display='none';
  var panel=document.getElementById('DC');panel.style.display='flex';panel.style.flexDirection='column';
  var loc=[c.adresse,c.cp,c.ville].filter(Boolean).join(', ');
  var rdv=e.rdv;var st=e.s||'';if(rdv)scom=rdv.c;
  var d1=document.createElement('div');d1.className='SBX';
  d1.innerHTML='<div class="CNM">'+c.nom+' '+c.prenom+'</div>'+(c.tel1?'<div class="CF"><span class="FL">Tel 1</span><a class="TLA" href="tel:'+c.tel1+'">'+c.tel1+'</a></div>':'')+(c.tel2?'<div class="CF"><span class="FL">Tel 2</span><a class="TLA" href="tel:'+c.tel2+'">'+c.tel2+'</a></div>':'')+(loc?'<div class="CF"><span class="FL">Adresse</span><span style="font-size:12px">'+loc+'</span></div>':'');
  var d2=document.createElement('div');d2.className='SBX';d2.innerHTML='<div class="ST2">Statut</div>';
  var sg2=document.createElement('div');sg2.className='SG2';
  [{k:'sgn',l:'Signe',c:'#22c55e',bg:'rgba(34,197,94,0.12)'},{k:'rcl',l:'Rappel',c:'#f59e0b',bg:'rgba(245,158,11,0.12)'},{k:'nrp',l:'NRP',c:'#8b5cf6',bg:'rgba(139,92,246,0.12)'},{k:'npe',l:'Pas interesse',c:'#ef4444',bg:'rgba(239,68,68,0.12)'}].forEach(function(s){
    var btn=document.createElement('button');btn.className='STB';btn.textContent=s.l;
    if(st===s.k){btn.style.borderColor=s.c;btn.style.background=s.bg;btn.style.color=s.c;}
    btn.addEventListener('click',function(){var ent=JSON.parse(JSON.stringify(ldb[id]||{}));if(ent.s===s.k)delete ent.s;else ent.s=s.k;dbSet(id,Object.keys(ent).length?ent:null,function(){toast('Statut mis a jour','OK');});});
    sg2.appendChild(btn);
  });
  d2.appendChild(sg2);
  var d3=document.createElement('div');d3.className='SBX';d3.innerHTML='<div class="ST2">Planifier un RDV</div>';
  var bBr=document.createElement('button');bBr.className='CB';bBr.textContent='BR Bresler';
  var bLe=document.createElement('button');bLe.className='CB';bLe.textContent='LE Lefebvre';
  function hilite(s){if(s==='bresler'){bBr.style.cssText='border-color:#00d4aa;background:rgba(0,212,170,0.12);color:#00d4aa';bLe.style.cssText='';}else{bLe.style.cssText='border-color:#ff6b8a;background:rgba(255,107,138,0.12);color:#ff6b8a';bBr.style.cssText='';}}
  if(scom)hilite(scom);
  bBr.addEventListener('click',function(){scom='bresler';hilite('bresler');});
  bLe.addEventListener('click',function(){scom='lefebvre';hilite('lefebvre');});
  var cor=document.createElement('div');cor.className='COR';cor.appendChild(bBr);cor.appendChild(bLe);
  var dIn=document.createElement('input');dIn.type='date';dIn.className='FI';dIn.value=rdv?rdv.d:new Date().toISOString().slice(0,10);
  var hIn=document.createElement('input');hIn.type='time';hIn.className='FI';hIn.value=rdv?rdv.h:'09:00';
  var nIn=document.createElement('textarea');nIn.className='FI';nIn.value=rdv?rdv.n||'':'';
  var bSv=document.createElement('button');bSv.className='BSV';bSv.textContent=rdv?'Modifier le RDV':'Enregistrer le RDV';if(rdv)bSv.style.background='#f59e0b';
  bSv.addEventListener('click',function(){if(!scom){toast('Selectionnez un commercial','ER');return;}var d=dIn.value;if(!d){toast('Selectionnez une date','ER');return;}var ent=JSON.parse(JSON.stringify(ldb[id]||{}));ent.rdv={c:scom,d:d,h:hIn.value,n:nIn.value};dbSet(id,ent,function(){toast('RDV enregistre','OK');});});
  var fr=document.createElement('div');fr.className='FR';
  var fg1=document.createElement('div');fg1.className='FG';fg1.innerHTML='<label class="FLA">Date</label>';fg1.appendChild(dIn);
  var fg2=document.createElement('div');fg2.className='FG';fg2.innerHTML='<label class="FLA">Heure</label>';fg2.appendChild(hIn);
  fr.appendChild(fg1);fr.appendChild(fg2);
  var fg3=document.createElement('div');fg3.className='FG';fg3.innerHTML='<label class="FLA">Notes</label>';fg3.appendChild(nIn);
  d3.appendChild(cor);d3.appendChild(fr);d3.appendChild(fg3);d3.appendChild(bSv);
  if(rdv){var bDl=document.createElement('button');bDl.className='BDL';bDl.textContent='Supprimer ce RDV';bDl.addEventListener('click',function(){if(!confirm('Supprimer ?'))return;var ent=JSON.parse(JSON.stringify(ldb[id]||{}));delete ent.rdv;dbSet(id,Object.keys(ent).length?ent:null,function(){toast('RDV supprime','IN');});});d3.appendChild(bDl);}
  panel.innerHTML='';panel.appendChild(d1);panel.appendChild(d2);panel.appendChild(d3);rList();
}

function rCom(){
  var me=user;if(!me||me==='standardiste')return;
  var col=me==='bresler'?'#00d4aa':'#ff6b8a';
  var myR=Object.entries(ldb).filter(function(e){return e[1]&&e[1].rdv&&e[1].rdv.c===me;}).map(function(e){return Object.assign({id:parseInt(e[0])},e[1]);}).sort(function(a,b){return(a.rdv.d+a.rdv.h).localeCompare(b.rdv.d+b.rdv.h);});
  var today=new Date().toISOString().slice(0,10);
  var up=myR.filter(function(r){return r.rdv.d>=today;});
  var pa=myR.filter(function(r){return r.rdv.d<today;});
  var nm=me==='bresler'?'Bresler':'Lefebvre';
  var h='<div class="CH3"><div class="CA" style="background:rgba('+(me==='bresler'?'0,212,170':'255,107,138')+',0.15);color:'+col+';border:1px solid '+col+'">'+(me==='bresler'?'BR':'LE')+'</div><div><div style="font-size:16px;font-weight:700">'+nm+'</div><div style="font-size:11px;color:#8888a0">'+myR.length+' RDV</div></div><button class="BEX" id="BEX2" style="margin-left:auto">Export</button></div>';
  if(!myR.length){h+='<div style="padding:40px;text-align:center;color:#8888a0">Aucun RDV</div>';}
  else{
    function grp(list,lbl){
      if(!list.length)return'';
      var g='<div class="GL2">'+lbl+'</div><div class="RL2">';
      list.forEach(function(r){
        var c=CM[r.id];if(!c)return;
        var dt=new Date(r.rdv.d+'T12:00:00');
        var day=dt.getDate().toString().padStart(2,'0');
        var mon=dt.toLocaleDateString('fr-FR',{month:'short'}).toUpperCase();
        var st=r.s||'';
        var addr=[c.adresse,c.cp,c.ville].filter(Boolean).join(', ');
        function mb(sk,lb,mc){var btn=document.createElement('button');btn.className='MB2';btn.textContent=lb;btn.dataset.id=r.id;btn.dataset.s=sk;if(st===sk){btn.style.borderColor=mc;btn.style.color=mc;}return btn.outerHTML;}
        g+='<div class="RC3"><div class="DC"><div class="DD2" style="color:'+col+'">'+day+'</div><div class="DM2">'+mon+'</div><div style="font-size:9px;color:#8888a0">'+(r.rdv.h||'')+'</div></div><div class="DV2"></div><div class="DI2"><div class="DN2">'+c.nom+' '+c.prenom+'</div>'+(c.tel1?'<div class="DA2" style="color:'+col+'">'+c.tel1+'</div>':'')+(addr?'<div class="DA2">'+addr+'</div>':'')+(r.rdv.n?'<div style="font-size:10px;color:#8888a0;font-style:italic">'+r.rdv.n+'</div>':'')+'</div><div class="DSC2">'+mb('sgn','Signe','#22c55e')+mb('rcl','Rappel','#f59e0b')+mb('nrp','NRP','#8b5cf6')+mb('npe','Pas int.','#ef4444')+'</div></div>';
      });
      return g+'</div>';
    }
    h+=grp(up,'A venir')+grp(pa,'Passes');
  }
  document.getElementById('CVL').innerHTML=h;
  document.querySelectorAll('.MB2').forEach(function(btn){
    btn.addEventListener('click',function(){var id=parseInt(btn.dataset.id);var sk=btn.dataset.s;var ent=JSON.parse(JSON.stringify(ldb[id]||{}));if(ent.s===sk)delete ent.s;else ent.s=sk;dbSet(id,Object.keys(ent).length?ent:null,function(){toast('Statut mis a jour','OK');rCom();});});
  });
  var bex2=document.getElementById('BEX2');if(bex2)bex2.addEventListener('click',doExport);
}

function doExport(){
  var rows=['COMMERCIAL;DATE;HEURE;NOM;PRENOM;TEL1;TEL2;ADRESSE;CP;VILLE;STATUT;NOTES'];
  Object.entries(ldb).forEach(function(e){var id=e[0];var d=e[1];if(!d||!d.rdv)return;if(user!=='standardiste'&&d.rdv.c!==user)return;var c=CM[parseInt(id)];if(!c)return;rows.push([d.rdv.c,d.rdv.d,d.rdv.h||'',c.nom,c.prenom,c.tel1,c.tel2,c.adresse,c.cp,c.ville,d.s?SL[d.s]:'',d.rdv.n||''].join(';'));});
  if(rows.length===1){toast('Aucun RDV','ER');return;}
  var csv=rows.join(String.fromCharCode(10));
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='RDV_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('Export OK','OK');
}

function toast(msg,type){var t=document.getElementById('TST');t.textContent=msg;t.className='TST VIS '+(type||'IN');clearTimeout(t._tm);t._tm=setTimeout(function(){t.className='TST';},3000);}
</script>
</body>
</html>
